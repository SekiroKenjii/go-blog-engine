services:
  blog-engine-db:
    image: postgres:17.4
    container_name: blog-engine-db
    restart: always
    environment:
      POSTGRES_DB: blog_engine_db
      POSTGRES_USER:
      POSTGRES_PASSWORD:
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../../internal/db/migrations/20250515_000001_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  blog-engine-api:
    build:
      context: ../../
      dockerfile: environments/docker/Dockerfile
    container_name: blog-engine-api
    restart: always
    depends_on:
      - blog-engine-db
    ports:
      - "8080:8080"

volumes:
  db_data:
